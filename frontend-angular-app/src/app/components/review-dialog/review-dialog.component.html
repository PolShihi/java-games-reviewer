<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content class="dialog-content">
  @if (error) {
    <div class="error-banner">{{ error }}</div>
  }

  <form [formGroup]="form" class="form-grid">
    <div class="field-row">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Media outlet</mat-label>
        <mat-select formControlName="mediaOutletId">
          @for (outlet of outlets; track outlet.id) {
            <mat-option [value]="outlet.id">
              {{ outlet.name }}
            </mat-option>
          }
        </mat-select>
      </mat-form-field>
      <button mat-stroked-button color="primary" type="button" (click)="openManageOutlets()">
        <mat-icon>build</mat-icon>
        Manage
      </button>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Score (0-100)</mat-label>
      <input matInput type="number" min="0" max="100" formControlName="score" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Summary</mat-label>
      <textarea matInput rows="3" formControlName="summary"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button color="primary" (click)="close()" [disabled]="submitting">Cancel</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="submitting">
    {{ initialReview?.id ? 'Save' : 'Add' }}
  </button>
</mat-dialog-actions>
